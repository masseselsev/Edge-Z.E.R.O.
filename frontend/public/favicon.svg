<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @keyframes eyePulse {
      0%, 100% {
        opacity: 0.4;
        transform: scale(0.85);
      }
      50% {
        opacity: 1;
        transform: scale(1.05);
      }
    }
    .pulse-layer {
      transform-origin: center;
      animation: eyePulse 2.5s infinite ease-in-out;
    }
  </style>
  
  <!-- Outer container matches logo design theme -->
  <rect width="32" height="32" rx="8" fill="#4f46e5" fill-opacity="0.1" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.25"/>
  
  <!-- Eye Graphic -->
  <g class="pulse-layer">
    <!-- Outer eye outline -->
    <path d="M5 16C9 10 12.5 8 16 8C19.5 8 23 10 27 16C23 22 19.5 24 16 24C12.5 24 9 22 5 16Z" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Pupil -->
    <circle cx="16" cy="16" r="3.5" fill="#a5b4fc"/>
  </g>
</svg>
